<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D –ü–ĺ–∑–ī—Ä–į–≤–Ľ–Ķ–Ĺ–ł–Ķ</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

<div class="scene" id="scene"></div>

<script>
const messages = [
    "happy",
    "Happy Birthday‚ú®ūüéČ",
    "all the best, DadūüíĖ",
    "stay strong‚ú®",
    "you've got this",
    "all the best, DadūüéČ",
    "stay strong‚ú®",
    "you've got this",
];
const images = [
    "1.jpg",
    "2.jpg",
    "3.jpg",
    "4.jpg",
    "5.jpg",
    "6.jpg",
];

const scene = document.getElementById("scene");
function createImage() {
    const img = document.createElement("img");
    img.className = "img";

    img.src = images[Math.floor(Math.random() * images.length)];

    // –≥–Ľ—É–Ī–ł–Ĺ–į
    let z = -(Math.random() * 800);
    img.style.setProperty("--z", z + "px");

    // –Ņ–ĺ–∑–ł—Ü–ł—Ź
    img.style.left = Math.random() * 140 - 20 + "%";

   img.style.width = "200px";
   img.style.height = "150px";
    // —Ā–ļ–ĺ—Ä–ĺ—Ā—ā—Ć
    let duration = 6 + (z / -800) * 6;
    img.style.animationDuration = duration + "s";

    scene.appendChild(img);

    setTimeout(() => img.remove(), duration * 1000);
}

function createText() {
    const el = document.createElement("div");
    el.className = "text";

    el.innerText = messages[Math.floor(Math.random() * messages.length)];

    // –≥–Ľ—É–Ī–ł–Ĺ–į (–ļ–į–ļ —Ā–Ľ–ĺ–ł –Ĺ–į —Ą–ĺ—ā–ĺ)
    let z = -(Math.random() * 800);

    el.style.setProperty("--z", z + "px");

    // —ą–ł—Ä–Ķ —Ä–į—Ā–Ņ—Ä–Ķ–ī–Ķ–Ľ–Ķ–Ĺ–ł–Ķ (—á—ā–ĺ–Ī—č –ļ–į–ļ "—Ā—ā–Ķ–Ĺ–į —ā–Ķ–ļ—Ā—ā–į")
    el.style.left = Math.random() * 140 - 20 + "%";

    // —Ä–į–∑–ľ–Ķ—Ä (—á–Ķ–ľ –Ī–Ľ–ł–∂–Ķ ‚ÄĒ —ā–Ķ–ľ –Ī–ĺ–Ľ—Ć—ą–Ķ)
    let size = 18 + (z / -800) * 40;
    el.style.fontSize = size + "px";

    // —Ā–ļ–ĺ—Ä–ĺ—Ā—ā—Ć (–ī–į–Ľ—Ć–Ĺ–ł–Ķ –ľ–Ķ–ī–Ľ–Ķ–Ĺ–Ĺ–Ķ–Ķ)
    let duration = 6 + (z / -800) * 6;
    el.style.animationDuration = duration + "s, " + duration + "s";

    // –Ī–Ķ–Ľ—č–Ļ –Ĺ–Ķ–ĺ–Ĺ –ļ–į–ļ –Ĺ–į —Ą–ĺ—ā–ĺ
    el.style.color = "#ffffff";
    el.style.textShadow = `
        0 0 6px #ffffff,
        0 0 12px #ffffff,
        0 0 20px rgba(255,255,255,0.5)
    `;

    scene.appendChild(el);

    setTimeout(() => el.remove(), duration * 1000);
}

// –Ņ–Ľ–ĺ—ā–Ĺ—č–Ļ –Ņ–ĺ—ā–ĺ–ļ —ā–Ķ–ļ—Ā—ā–į
setInterval(createText, 100);
setInterval(createImage, 2000);
</script>

</body>
</html>
